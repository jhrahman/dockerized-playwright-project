<svg width="100%" viewBox="0 0 860 320" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Dockerized Playwright Automation — Jahidur Rahman</title>
  <desc>Animated CI/CD pipeline: GitHub Actions triggers Dockerfile.ci build, Playwright tests run inside container, Allure report generates, then publishes to GitHub Pages</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#1a1f2e"/>
      <stop offset="100%" stop-color="#141820"/>
    </linearGradient>
    <linearGradient id="top-stripe" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#f59e0b"/>
      <stop offset="40%"  stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>

  <rect width="860" height="320" rx="14" fill="url(#bg)"/>
  <rect width="860" height="320" rx="14" fill="none" stroke="#2d3448" stroke-width="1"/>
  <rect x="0" y="0" width="860" height="3" rx="2" fill="url(#top-stripe)"/>

  <!-- terminal bar -->
  <rect x="32" y="14" width="796" height="22" rx="5" fill="#0d1117" fill-opacity="0.7" stroke="#2d3448" stroke-width="0.8"/>
  <circle cx="48"  cy="25" r="4" fill="#ff5f57" opacity="0.85"/>
  <circle cx="63"  cy="25" r="4" fill="#febc2e" opacity="0.85"/>
  <circle cx="78"  cy="25" r="4" fill="#28c840" opacity="0.85"/>
  <text x="94" y="30" font-family="'Courier New',monospace" font-size="10" fill="#4b5563">$ git push origin main  →  GitHub Actions triggered  →  Dockerfile.ci  →  npx playwright test  →  allure generate  →  gh-pages</text>

  <!-- ── PIPELINE ─────────────────────────────────────
       6 boxes. x: 32, 178, 314, 450, 586, 714
       widths: 134, 124, 124, 124, 116, 134
  ──────────────────────────────────────────────────── -->

  <!-- S1: GitHub Actions -->
  <rect x="32"  y="46" width="134" height="56" rx="8" fill="#251e10" fill-opacity="0.95" stroke="#f59e0b" stroke-width="0.9"/>
  <rect x="32"  y="46" width="4"   height="56" rx="2" fill="#f59e0b"/>
  <text x="99"  y="67" font-family="'Courier New',monospace" font-size="11" font-weight="700" fill="#fcd34d" text-anchor="middle">GitHub Actions</text>
  <text x="99"  y="82" font-family="'Courier New',monospace" font-size="9"  fill="#78716c" text-anchor="middle">git push → trigger</text>
  <rect x="40"  y="96" width="118" height="2.5" rx="1" fill="#2d3448"/>
  <rect x="40"  y="96" width="0"   height="2.5" rx="1" fill="#f59e0b">
    <animate attributeName="width" values="0;118;118;0" keyTimes="0;0.20;0.38;1" dur="6s" repeatCount="indefinite"/>
  </rect>

  <!-- arrow 1→2 -->
  <line x1="167" y1="74" x2="175" y2="74" stroke="#2d3448" stroke-width="1.5"/>
  <polygon points="175,70 183,74 175,78" fill="#2d3448"/>
  <circle r="3" fill="#f59e0b" opacity="0">
    <animateMotion path="M167,74 L180,74" dur="6s" begin="0.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.05;0.85;1" dur="6s" begin="0.5s" repeatCount="indefinite"/>
  </circle>

  <!-- S2: Dockerfile.ci -->
  <rect x="183" y="46" width="124" height="56" rx="8" fill="#1e2538" fill-opacity="0.95" stroke="#3b82f6" stroke-width="0.9"/>
  <rect x="183" y="46" width="4"   height="56" rx="2" fill="#3b82f6"/>
  <text x="245" y="67" font-family="'Courier New',monospace" font-size="11" font-weight="700" fill="#93c5fd" text-anchor="middle">Dockerfile.ci</text>
  <text x="245" y="82" font-family="'Courier New',monospace" font-size="9"  fill="#64748b" text-anchor="middle">build CI image</text>
  <rect x="191" y="96" width="108" height="2.5" rx="1" fill="#2d3448"/>
  <rect x="191" y="96" width="0"   height="2.5" rx="1" fill="#3b82f6">
    <animate attributeName="width" values="0;0;108;108;0" keyTimes="0;0.16;0.38;0.52;1" dur="6s" repeatCount="indefinite"/>
  </rect>

  <!-- arrow 2→3 -->
  <line x1="308" y1="74" x2="316" y2="74" stroke="#2d3448" stroke-width="1.5"/>
  <polygon points="316,70 324,74 316,78" fill="#2d3448"/>
  <circle r="3" fill="#3b82f6" opacity="0">
    <animateMotion path="M308,74 L320,74" dur="6s" begin="1.1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.05;0.85;1" dur="6s" begin="1.1s" repeatCount="indefinite"/>
  </circle>

  <!-- S3: Container -->
  <rect x="324" y="46" width="124" height="56" rx="8" fill="#1a2535" fill-opacity="0.95" stroke="#0ea5e9" stroke-width="0.9"/>
  <rect x="324" y="46" width="4"   height="56" rx="2" fill="#0ea5e9"/>
  <text x="386" y="67" font-family="'Courier New',monospace" font-size="11" font-weight="700" fill="#7dd3fc" text-anchor="middle">Container</text>
  <text x="386" y="82" font-family="'Courier New',monospace" font-size="9"  fill="#64748b" text-anchor="middle">node:22 + Allure CLI</text>
  <rect x="332" y="96" width="108" height="2.5" rx="1" fill="#2d3448"/>
  <rect x="332" y="96" width="0"   height="2.5" rx="1" fill="#0ea5e9">
    <animate attributeName="width" values="0;0;0;108;108;0" keyTimes="0;0.30;0.38;0.54;0.66;1" dur="6s" repeatCount="indefinite"/>
  </rect>
  <circle cx="440" cy="55" r="4" fill="#22c55e">
    <animate attributeName="opacity" values="1;0.15;1" dur="1.6s" repeatCount="indefinite"/>
  </circle>

  <!-- arrow 3→4 -->
  <line x1="449" y1="74" x2="457" y2="74" stroke="#2d3448" stroke-width="1.5"/>
  <polygon points="457,70 465,74 457,78" fill="#2d3448"/>
  <circle r="3" fill="#0ea5e9" opacity="0">
    <animateMotion path="M449,74 L461,74" dur="6s" begin="1.7s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.05;0.85;1" dur="6s" begin="1.7s" repeatCount="indefinite"/>
  </circle>

  <!-- S4: Playwright Tests -->
  <rect x="465" y="46" width="124" height="56" rx="8" fill="#182318" fill-opacity="0.95" stroke="#22c55e" stroke-width="0.9"/>
  <rect x="465" y="46" width="4"   height="56" rx="2" fill="#22c55e"/>
  <text x="527" y="67" font-family="'Courier New',monospace" font-size="11" font-weight="700" fill="#86efac" text-anchor="middle">Playwright</text>
  <text x="527" y="82" font-family="'Courier New',monospace" font-size="9"  fill="#64748b" text-anchor="middle">run test suite</text>
  <rect x="473" y="96" width="108" height="2.5" rx="1" fill="#2d3448"/>
  <rect x="473" y="96" width="0"   height="2.5" rx="1" fill="#22c55e">
    <animate attributeName="width" values="0;0;0;0;108;108;0" keyTimes="0;0.40;0.48;0.56;0.70;0.82;1" dur="6s" repeatCount="indefinite"/>
  </rect>

  <!-- arrow 4→5 -->
  <line x1="590" y1="74" x2="598" y2="74" stroke="#2d3448" stroke-width="1.5"/>
  <polygon points="598,70 606,74 598,78" fill="#2d3448"/>
  <circle r="3" fill="#22c55e" opacity="0">
    <animateMotion path="M590,74 L602,74" dur="6s" begin="2.3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.05;0.85;1" dur="6s" begin="2.3s" repeatCount="indefinite"/>
  </circle>

  <!-- S5: Allure Report -->
  <rect x="606" y="46" width="116" height="56" rx="8" fill="#1e1a2e" fill-opacity="0.95" stroke="#a855f7" stroke-width="0.9"/>
  <rect x="606" y="46" width="4"   height="56" rx="2" fill="#a855f7"/>
  <text x="664" y="67" font-family="'Courier New',monospace" font-size="11" font-weight="700" fill="#d8b4fe" text-anchor="middle">Allure Report</text>
  <text x="664" y="82" font-family="'Courier New',monospace" font-size="9"  fill="#64748b" text-anchor="middle">allure generate</text>
  <rect x="614" y="96" width="100" height="2.5" rx="1" fill="#2d3448"/>
  <rect x="614" y="96" width="0"   height="2.5" rx="1" fill="#a855f7">
    <animate attributeName="width" values="0;0;0;0;0;100;100;0" keyTimes="0;0.58;0.65;0.70;0.76;0.84;0.92;1" dur="6s" repeatCount="indefinite"/>
  </rect>

  <!-- arrow 5→6 -->
  <line x1="723" y1="74" x2="731" y2="74" stroke="#2d3448" stroke-width="1.5"/>
  <polygon points="731,70 739,74 731,78" fill="#2d3448"/>
  <circle r="3" fill="#a855f7" opacity="0">
    <animateMotion path="M723,74 L735,74" dur="6s" begin="2.9s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.05;0.85;1" dur="6s" begin="2.9s" repeatCount="indefinite"/>
  </circle>

  <!-- S6: GitHub Pages -->
  <rect x="739" y="46" width="118" height="56" rx="8" fill="#16201a" fill-opacity="0.95" stroke="#1d9e75" stroke-width="0.9"/>
  <rect x="739" y="46" width="4"   height="56" rx="2" fill="#1d9e75"/>
  <text x="798" y="67" font-family="'Courier New',monospace" font-size="11" font-weight="700" fill="#5DCAA5" text-anchor="middle">GitHub Pages</text>
  <text x="798" y="82" font-family="'Courier New',monospace" font-size="9" text-anchor="middle" fill="#64748b">
    <animate attributeName="fill" values="#64748b;#64748b;#64748b;#5DCAA5;#5DCAA5;#64748b" keyTimes="0;0.80;0.86;0.90;0.96;1" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="textContent" values="publish report;publish report;publish report;✓ live at gh-pages;✓ live at gh-pages;publish report" calcMode="discrete" keyTimes="0;0.80;0.86;0.90;0.96;1" dur="6s" repeatCount="indefinite"/>publish report
  </text>
  <rect x="747" y="96" width="102" height="2.5" rx="1" fill="#2d3448"/>
  <rect x="747" y="96" width="0"   height="2.5" rx="1" fill="#1d9e75">
    <animate attributeName="width" values="0;0;0;0;0;0;102;102;0" keyTimes="0;0.68;0.74;0.78;0.82;0.86;0.92;0.97;1" dur="6s" repeatCount="indefinite"/>
  </rect>

  <!-- ── DIVIDER ─────────────────────────────────────── -->
  <line x1="32" y1="118" x2="828" y2="118" stroke="#2d3448" stroke-width="1"/>

  <!-- ── TITLE ──────────────────────────────────────── -->
  <text x="32"  y="156" font-family="'Courier New',monospace" font-size="22" font-weight="700" fill="#f1f5f9" letter-spacing="-0.5">Dockerized Playwright</text>
  <text x="32"  y="177" font-family="'Courier New',monospace" font-size="14" font-weight="700" fill="#3b82f6">Automation</text>
  <text x="32"  y="195" font-family="'Courier New',monospace" font-size="10" fill="#475569">// reproducible · local + CI · Allure report · GitHub Pages</text>

  <!-- ── ACTIVELY MAINTAINED SPINNER ───────────────────
       Positioned top-right of the title block, y=130–195 range
  ──────────────────────────────────────────────────── -->
  <!-- spinner background pill -->
  <rect x="628" y="148" width="200" height="52" rx="26" fill="#1a1f2e" stroke="#2d3448" stroke-width="1"/>

  <!-- spinning arc: three arcs layered to fake a rotating dashed ring -->
  <!-- outer ring track -->
  <circle cx="661" cy="174" r="18" fill="none" stroke="#2d3448" stroke-width="2.5"/>
  <!-- spinning arc segment -->
  <circle cx="661" cy="174" r="18" fill="none" stroke="#22c55e" stroke-width="2.5"
    stroke-dasharray="28 84" stroke-linecap="round">
    <animateTransform attributeName="transform" type="rotate"
      from="0 661 174" to="360 661 174"
      dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <!-- second arc, offset, slower — creates layered feel -->
  <circle cx="661" cy="174" r="18" fill="none" stroke="#3b82f6" stroke-width="2.5" opacity="0.5"
    stroke-dasharray="14 98" stroke-linecap="round">
    <animateTransform attributeName="transform" type="rotate"
      from="180 661 174" to="540 661 174"
      dur="2.6s" repeatCount="indefinite"/>
  </circle>
  <!-- inner dot at spinner centre -->
  <circle cx="661" cy="174" r="3.5" fill="#22c55e">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.8s" repeatCount="indefinite"/>
  </circle>

  <!-- label text -->
  <text x="690" y="168" font-family="'Courier New',monospace" font-size="10" font-weight="700" fill="#e2e8f0">actively</text>
  <text x="690" y="182" font-family="'Courier New',monospace" font-size="10" font-weight="700" fill="#22c55e">maintained</text>
  <!-- sub label -->
  <text x="690" y="195" font-family="'Courier New',monospace" font-size="8" fill="#475569">expanding coverage</text>

  <!-- ── FEATURE CARDS ──────────────────────────────── -->
  <line x1="32" y1="207" x2="828" y2="207" stroke="#2d3448" stroke-width="1"/>

  <rect x="32"  y="217" width="184" height="40" rx="7" fill="#1e2538" fill-opacity="0.8" stroke="#2d3448" stroke-width="0.8"/>
  <rect x="32"  y="217" width="4"   height="40" rx="2" fill="#3b82f6"/>
  <text x="44"  y="233" font-family="'Courier New',monospace" font-size="10" font-weight="700" fill="#93c5fd">Dockerfile.dev</text>
  <text x="44"  y="248" font-family="'Courier New',monospace" font-size="9"  fill="#475569">local dev · bind mount</text>

  <rect x="224" y="217" width="184" height="40" rx="7" fill="#182318" fill-opacity="0.8" stroke="#2d3448" stroke-width="0.8"/>
  <rect x="224" y="217" width="4"   height="40" rx="2" fill="#22c55e"/>
  <text x="236" y="233" font-family="'Courier New',monospace" font-size="10" font-weight="700" fill="#86efac">On Failure</text>
  <text x="236" y="248" font-family="'Courier New',monospace" font-size="9"  fill="#475569">screenshot · video · trace</text>

  <rect x="416" y="217" width="184" height="40" rx="7" fill="#1e1a2e" fill-opacity="0.8" stroke="#2d3448" stroke-width="0.8"/>
  <rect x="416" y="217" width="4"   height="40" rx="2" fill="#a855f7"/>
  <text x="428" y="233" font-family="'Courier New',monospace" font-size="10" font-weight="700" fill="#d8b4fe">Page Object Model</text>
  <text x="428" y="248" font-family="'Courier New',monospace" font-size="9"  fill="#475569">pages · utils · fixtures</text>

  <rect x="608" y="217" width="220" height="40" rx="7" fill="#16201a" fill-opacity="0.8" stroke="#2d3448" stroke-width="0.8"/>
  <rect x="608" y="217" width="4"   height="40" rx="2" fill="#1d9e75"/>
  <text x="620" y="233" font-family="'Courier New',monospace" font-size="10" font-weight="700" fill="#5DCAA5">Multi-browser</text>
  <text x="620" y="248" font-family="'Courier New',monospace" font-size="9"  fill="#475569">chromium · firefox · webkit</text>

  <!-- ── FOOTER ──────────────────────────────────────── -->
  <line x1="32" y1="270" x2="828" y2="270" stroke="#2d3448" stroke-width="1"/>

  <circle cx="44" cy="290" r="4" fill="#22c55e">
    <animate attributeName="opacity" values="1;0.15;1" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <text x="56" y="295" font-family="'Courier New',monospace" font-size="10" fill="#22c55e">pipeline active</text>

  <text x="186" y="285" font-family="'Courier New',monospace" font-size="9"  fill="#475569">tests run</text>
  <text x="186" y="298" font-family="'Courier New',monospace" font-size="12" font-weight="700" fill="#86efac">
    <animate attributeName="textContent" values="00;06;13;20;28;35;42;47;47" calcMode="discrete" keyTimes="0;0.1;0.2;0.35;0.5;0.62;0.75;0.88;1" dur="6s" repeatCount="indefinite"/>47
  </text>

  <text x="248" y="285" font-family="'Courier New',monospace" font-size="9"  fill="#475569">passed</text>
  <text x="248" y="298" font-family="'Courier New',monospace" font-size="12" font-weight="700" fill="#4ade80">46</text>

  <text x="300" y="285" font-family="'Courier New',monospace" font-size="9"  fill="#475569">failed</text>
  <text x="300" y="298" font-family="'Courier New',monospace" font-size="12" font-weight="700" fill="#f87171">01</text>

  <text x="352" y="285" font-family="'Courier New',monospace" font-size="9"  fill="#475569">duration</text>
  <text x="352" y="298" font-family="'Courier New',monospace" font-size="12" font-weight="700" fill="#fcd34d">
    <animate attributeName="textContent" values="0.0s;0.5s;1.2s;1.9s;2.6s;3.1s;3.6s;4.0s;4.2s" calcMode="discrete" keyTimes="0;0.1;0.2;0.35;0.5;0.62;0.75;0.88;1" dur="6s" repeatCount="indefinite"/>4.2s
  </text>

  <rect x="440" y="281" width="44" height="18" rx="4" fill="#1e2538" stroke="#3b82f6" stroke-width="0.7"/>
  <text x="462" y="294" font-family="'Courier New',monospace" font-size="9" fill="#93c5fd" text-anchor="middle">local</text>

  <rect x="492" y="281" width="32" height="18" rx="4" fill="#251e10" stroke="#f59e0b" stroke-width="0.7"/>
  <text x="508" y="294" font-family="'Courier New',monospace" font-size="9" fill="#fcd34d" text-anchor="middle">CI</text>

  <rect x="532" y="281" width="76" height="18" rx="4" fill="#1e1a2e" stroke="#a855f7" stroke-width="0.7"/>
  <text x="570" y="294" font-family="'Courier New',monospace" font-size="9" fill="#d8b4fe" text-anchor="middle">Allure · Pages</text>

  <text x="828" y="295" font-family="'Courier New',monospace" font-size="9" fill="#374151" text-anchor="end">github.com/jhrahman</text>
</svg>
