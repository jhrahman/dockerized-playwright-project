<svg width="100%" viewBox="0 0 900 320" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Dockerized Playwright Automation — Jahidur Rahman</title>
  <desc>Animated CI/CD pipeline: scheduled GitHub Actions, Dockerfile.ci build, container, Playwright tests, Allure report, GitHub Pages, Discord notification</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0%"   stop-color="#161b27"/>
      <stop offset="100%" stop-color="#0f1219"/>
    </linearGradient>
    <linearGradient id="stripe" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#f59e0b"/>
      <stop offset="30%"  stop-color="#22c55e"/>
      <stop offset="70%"  stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#5865f2"/>
    </linearGradient>
  </defs>

  <rect width="900" height="320" rx="14" fill="url(#bg)"/>
  <rect width="900" height="320" rx="14" fill="none" stroke="#252d3d" stroke-width="1"/>
  <rect x="0" y="0" width="900" height="3" rx="2" fill="url(#stripe)"/>

  <!-- terminal bar -->
  <rect x="28" y="13" width="844" height="22" rx="5" fill="#0a0e17" stroke="#252d3d" stroke-width="0.8"/>
  <circle cx="44"  cy="24" r="3.5" fill="#ff5f57" opacity="0.9"/>
  <circle cx="57"  cy="24" r="3.5" fill="#febc2e" opacity="0.9"/>
  <circle cx="70"  cy="24" r="3.5" fill="#28c840" opacity="0.9"/>
  <text x="84" y="29" font-family="'Courier New',monospace" font-size="9.5" fill="#3d4d60">$ cron Mon 09:00 UTC · push main · workflow_dispatch  →  Dockerfile.ci  →  playwright test  →  allure generate  →  gh-pages  →  discord</text>

  <!-- ══ PIPELINE ══════════════════════════════════════
       7 stages. viewBox=900, padding 28 each side → usable=844
       Widths all 96, gaps 12 → 7×96 + 6×12 = 672+72 = 744 → centre in 844 → start x=28+(844-744)/2=78
       Actually start at 28 to use full width:
       widths: 96 each, gap 14 → 7×96=672, 6×14=84, total=756, remaining=844-756=88, add to each gap: 88/6≈14.6
       Simpler: 7 equal cards w=100, gap=14 → 7×100+6×14=700+84=784 → left pad=(844-784)/2=30 → x start=28+30=58
       x positions: 58, 172, 286, 400, 514, 628, 742  end=742+100=842 ✓
  ════════════════════════════════════════════════════ -->

  <!-- S1: GitHub Actions -->
