<svg width="100%" viewBox="0 0 800 310" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Dockerized Playwright Automation — Jahidur Rahman</title>
  <desc>Animated pipeline banner: Docker build, container, Playwright tests, HTML report, GitHub Actions CI/CD with live counters</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#1a1f2e"/>
      <stop offset="100%" stop-color="#141820"/>
    </linearGradient>
    <linearGradient id="top-stripe" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d9e75"/>
    </linearGradient>
  </defs>

  <!-- card -->
  <rect width="800" height="310" rx="14" fill="url(#bg)"/>
  <rect width="800" height="310" rx="14" fill="none" stroke="#2d3448" stroke-width="1"/>
  <!-- top accent stripe -->
  <rect x="0" y="0" width="800" height="3" rx="2" fill="url(#top-stripe)"/>

  <!-- terminal command bar -->
  <rect x="32" y="14" width="736" height="22" rx="5" fill="#0d1117" fill-opacity="0.7" stroke="#2d3448" stroke-width="0.8"/>
  <circle cx="48"  cy="25" r="4" fill="#ff5f57" opacity="0.85"/>
  <circle cx="63"  cy="25" r="4" fill="#febc2e" opacity="0.85"/>
  <circle cx="78"  cy="25" r="4" fill="#28c840" opacity="0.85"/>
  <text x="94" y="30" font-family="'Courier New',monospace" font-size="10" fill="#4b5563">$ docker compose up -d &amp;&amp; npx playwright test --reporter=html</text>

  <!-- ── STAGE BOXES ─────────────────────────────────
       5 boxes: w=122, gap=14, start=32
       box heights: 52, progress bar: 3px at y=92 inside box
  ──────────────────────────────────────────────────── -->

  <!-- S1: Docker Build -->
  <rect x="32"  y="46" width="122" height="52" rx="8" fill="#1e2538" stroke="#3b82f6" stroke-width="0.8" fill-opacity="0.9"/>
  <rect x="32"  y="46" width="4"   height="52" rx="2" fill="#3b82f6"/>
  <text x="75"  y="68" font-family="'Courier New',monospace" font-size="11" font-weight="700" fill="#93c5fd" text-anchor="middle">Docker Build</text>
  <text x="75"  y="84" font-family="'Courier New',monospace" font-size="9"  fill="#64748b" text-anchor="middle">build image</text>
  <rect x="40"  y="92" width="106" height="2.5" rx="1" fill="#2d3448"/>
  <rect x="40"  y="92" width="0"   height="2.5" rx="1" fill="#3b82f6">
    <animate attributeName="width" values="0;106;106;0" keyTimes="0;0.30;0.55;1" dur="5s" repeatCount="indefinite"/>
  </rect>

  <!-- arrow 1→2 -->
  <line x1="155" y1="72" x2="173" y2="72" stroke="#2d3448" stroke-width="1.5"/>
  <polygon points="173,68 181,72 173,76" fill="#2d3448"/>
  <circle r="3" fill="#3b82f6" opacity="0">
    <animateMotion path="M155,72 L177,72" dur="5s" begin="0.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.05;0.85;1" dur="5s" begin="0.5s" repeatCount="indefinite"/>
  </circle>

  <!-- S2: Container -->
  <rect x="181" y="46" width="122" height="52" rx="8" fill="#1a2535" stroke="#0ea5e9" stroke-width="0.8" fill-opacity="0.9"/>
  <rect x="181" y="46" width="4"   height="52" rx="2" fill="#0ea5e9"/>
  <text x="242" y="68" font-family="'Courier New',monospace" font-size="11" font-weight="700" fill="#7dd3fc" text-anchor="middle">Container</text>
  <text x="242" y="84" font-family="'Courier New',monospace" font-size="9"  fill="#64748b" text-anchor="middle">node:22 + deps</text>
  <rect x="189" y="92" width="106" height="2.5" rx="1" fill="#2d3448"/>
  <rect x="189" y="92" width="0"   height="2.5" rx="1" fill="#0ea5e9">
    <animate attributeName="width" values="0;0;106;106;0" keyTimes="0;0.18;0.48;0.65;1" dur="5s" repeatCount="indefinite"/>
  </rect>
  <!-- live dot -->
  <circle cx="294" cy="55" r="4" fill="#22c55e">
    <animate attributeName="opacity" values="1;0.15;1" dur="1.6s" repeatCount="indefinite"/>
  </circle>

  <!-- arrow 2→3 -->
  <line x1="304" y1="72" x2="322" y2="72" stroke="#2d3448" stroke-width="1.5"/>
  <polygon points="322,68 330,72 322,76" fill="#2d3448"/>
  <circle r="3" fill="#0ea5e9" opacity="0">
    <animateMotion path="M304,72 L326,72" dur="5s" begin="1.1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.05;0.85;1" dur="5s" begin="1.1s" repeatCount="indefinite"/>
  </circle>

  <!-- S3: Playwright -->
  <rect x="330" y="46" width="122" height="52" rx="8" fill="#182318" stroke="#22c55e" stroke-width="0.8" fill-opacity="0.9"/>
  <rect x="330" y="46" width="4"   height="52" rx="2" fill="#22c55e"/>
  <text x="391" y="68" font-family="'Courier New',monospace" font-size="11" font-weight="700" fill="#86efac" text-anchor="middle">Playwright</text>
  <text x="391" y="84" font-family="'Courier New',monospace" font-size="9"  fill="#64748b" text-anchor="middle">run test suite</text>
  <rect x="338" y="92" width="106" height="2.5" rx="1" fill="#2d3448"/>
  <rect x="338" y="92" width="0"   height="2.5" rx="1" fill="#22c55e">
    <animate attributeName="width" values="0;0;0;106;106;0" keyTimes="0;0.28;0.40;0.65;0.80;1" dur="5s" repeatCount="indefinite"/>
  </rect>

  <!-- arrow 3→4 -->
  <line x1="453" y1="72" x2="471" y2="72" stroke="#2d3448" stroke-width="1.5"/>
  <polygon points="471,68 479,72 471,76" fill="#2d3448"/>
  <circle r="3" fill="#22c55e" opacity="0">
    <animateMotion path="M453,72 L475,72" dur="5s" begin="1.7s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.05;0.85;1" dur="5s" begin="1.7s" repeatCount="indefinite"/>
  </circle>

  <!-- S4: HTML Report -->
  <rect x="479" y="46" width="122" height="52" rx="8" fill="#1e1a2e" stroke="#a855f7" stroke-width="0.8" fill-opacity="0.9"/>
  <rect x="479" y="46" width="4"   height="52" rx="2" fill="#a855f7"/>
  <text x="540" y="68" font-family="'Courier New',monospace" font-size="11" font-weight="700" fill="#d8b4fe" text-anchor="middle">HTML Report</text>
  <text x="540" y="84" font-family="'Courier New',monospace" font-size="9"  fill="#64748b" text-anchor="middle">upload artifacts</text>
  <rect x="487" y="92" width="106" height="2.5" rx="1" fill="#2d3448"/>
  <rect x="487" y="92" width="0"   height="2.5" rx="1" fill="#a855f7">
    <animate attributeName="width" values="0;0;0;0;106;106;0" keyTimes="0;0.48;0.56;0.62;0.76;0.88;1" dur="5s" repeatCount="indefinite"/>
  </rect>

  <!-- arrow 4→5 -->
  <line x1="602" y1="72" x2="620" y2="72" stroke="#2d3448" stroke-width="1.5"/>
  <polygon points="620,68 628,72 620,76" fill="#2d3448"/>
  <circle r="3" fill="#a855f7" opacity="0">
    <animateMotion path="M602,72 L624,72" dur="5s" begin="2.3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.05;0.85;1" dur="5s" begin="2.3s" repeatCount="indefinite"/>
  </circle>

  <!-- S5: GitHub Actions — pass text now sits BELOW progress bar at y=104 clear of bar at y=92 -->
  <rect x="628" y="46" width="140" height="52" rx="8" fill="#251e10" stroke="#f59e0b" stroke-width="0.8" fill-opacity="0.9"/>
  <rect x="628" y="46" width="4"   height="52" rx="2" fill="#f59e0b"/>
  <text x="698" y="68" font-family="'Courier New',monospace" font-size="11" font-weight="700" fill="#fcd34d" text-anchor="middle">GitHub Actions</text>
  <!-- status line: toggles between "CI/CD pipeline" and "✓ passed" -->
  <text x="698" y="84" font-family="'Courier New',monospace" font-size="9" fill="#78716c" text-anchor="middle">
    <animate attributeName="fill"
      values="#78716c;#78716c;#78716c;#78716c;#78716c;#22c55e;#22c55e;#78716c"
      keyTimes="0;0.56;0.62;0.70;0.78;0.82;0.94;1"
      dur="5s" repeatCount="indefinite"/>
    <animate attributeName="textContent"
      values="CI/CD pipeline;CI/CD pipeline;CI/CD pipeline;CI/CD pipeline;CI/CD pipeline;✓ all checks passed;✓ all checks passed;CI/CD pipeline"
      calcMode="discrete"
      keyTimes="0;0.56;0.62;0.70;0.78;0.82;0.94;1"
      dur="5s" repeatCount="indefinite"/>CI/CD pipeline
  </text>
  <!-- progress bar kept strictly inside its row -->
  <rect x="636" y="92" width="124" height="2.5" rx="1" fill="#2d3448"/>
  <rect x="636" y="92" width="0"   height="2.5" rx="1" fill="#f59e0b">
    <animate attributeName="width" values="0;0;0;0;0;124;124;0" keyTimes="0;0.56;0.62;0.70;0.78;0.86;0.94;1" dur="5s" repeatCount="indefinite"/>
  </rect>

  <!-- ── DIVIDER ─────────────────────────────────────── -->
  <line x1="32" y1="114" x2="768" y2="114" stroke="#2d3448" stroke-width="1"/>

  <!-- ── TITLE ──────────────────────────────────────── -->
  <text x="32"  y="152" font-family="'Courier New',monospace" font-size="22" font-weight="700" fill="#f1f5f9" letter-spacing="-0.5">Dockerized Playwright</text>
  <text x="32"  y="173" font-family="'Courier New',monospace" font-size="14" font-weight="700" fill="#3b82f6">Automation</text>
  <text x="32"  y="191" font-family="'Courier New',monospace" font-size="10" fill="#475569">// reproducible · local + CI · containerised execution</text>

  <!-- ── FEATURE CARDS ──────────────────────────────── -->
  <line x1="32" y1="203" x2="768" y2="203" stroke="#2d3448" stroke-width="1"/>

  <!-- Bind Mount -->
  <rect x="32"  y="213" width="172" height="38" rx="7" fill="#1e2538" fill-opacity="0.8" stroke="#2d3448" stroke-width="0.8"/>
  <rect x="32"  y="213" width="4"   height="38" rx="2" fill="#0ea5e9"/>
  <text x="44"  y="228" font-family="'Courier New',monospace" font-size="10" font-weight="700" fill="#7dd3fc">Bind Mount</text>
  <text x="44"  y="243" font-family="'Courier New',monospace" font-size="9"  fill="#475569">host ↔ /app live sync</text>

  <!-- On Failure -->
  <rect x="212" y="213" width="172" height="38" rx="7" fill="#182318" fill-opacity="0.8" stroke="#2d3448" stroke-width="0.8"/>
  <rect x="212" y="213" width="4"   height="38" rx="2" fill="#22c55e"/>
  <text x="224" y="228" font-family="'Courier New',monospace" font-size="10" font-weight="700" fill="#86efac">On Failure</text>
  <text x="224" y="243" font-family="'Courier New',monospace" font-size="9"  fill="#475569">screenshot · video · trace</text>

  <!-- Page Object Model -->
  <rect x="392" y="213" width="172" height="38" rx="7" fill="#1e1a2e" fill-opacity="0.8" stroke="#2d3448" stroke-width="0.8"/>
  <rect x="392" y="213" width="4"   height="38" rx="2" fill="#a855f7"/>
  <text x="404" y="228" font-family="'Courier New',monospace" font-size="10" font-weight="700" fill="#d8b4fe">Page Object Model</text>
  <text x="404" y="243" font-family="'Courier New',monospace" font-size="9"  fill="#475569">pages · utils · fixtures</text>

  <!-- Multi-browser -->
  <rect x="572" y="213" width="196" height="38" rx="7" fill="#251e10" fill-opacity="0.8" stroke="#2d3448" stroke-width="0.8"/>
  <rect x="572" y="213" width="4"   height="38" rx="2" fill="#f59e0b"/>
  <text x="584" y="228" font-family="'Courier New',monospace" font-size="10" font-weight="700" fill="#fcd34d">Multi-browser</text>
  <text x="584" y="243" font-family="'Courier New',monospace" font-size="9"  fill="#475569">chromium · firefox · webkit</text>

  <!-- ── FOOTER ──────────────────────────────────────── -->
  <line x1="32" y1="263" x2="768" y2="263" stroke="#2d3448" stroke-width="1"/>

  <!-- live dot -->
  <circle cx="44" cy="283" r="4" fill="#22c55e">
    <animate attributeName="opacity" values="1;0.15;1" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <text x="56" y="288" font-family="'Courier New',monospace" font-size="10" fill="#22c55e">pipeline active</text>

  <!-- counters -->
  <text x="180" y="279" font-family="'Courier New',monospace" font-size="9"  fill="#475569">tests run</text>
  <text x="180" y="292" font-family="'Courier New',monospace" font-size="12" font-weight="700" fill="#86efac">
    <animate attributeName="textContent" values="00;06;13;20;28;35;42;47;47" calcMode="discrete" keyTimes="0;0.1;0.2;0.35;0.5;0.62;0.75;0.88;1" dur="5s" repeatCount="indefinite"/>47
  </text>

  <text x="240" y="279" font-family="'Courier New',monospace" font-size="9"  fill="#475569">passed</text>
  <text x="240" y="292" font-family="'Courier New',monospace" font-size="12" font-weight="700" fill="#4ade80">46</text>

  <text x="292" y="279" font-family="'Courier New',monospace" font-size="9"  fill="#475569">failed</text>
  <text x="292" y="292" font-family="'Courier New',monospace" font-size="12" font-weight="700" fill="#f87171">01</text>

  <text x="344" y="279" font-family="'Courier New',monospace" font-size="9"  fill="#475569">duration</text>
  <text x="344" y="292" font-family="'Courier New',monospace" font-size="12" font-weight="700" fill="#fcd34d">
    <animate attributeName="textContent" values="0.0s;0.5s;1.1s;1.8s;2.5s;3.0s;3.5s;3.9s;4.2s" calcMode="discrete" keyTimes="0;0.1;0.2;0.35;0.5;0.62;0.75;0.88;1" dur="5s" repeatCount="indefinite"/>4.2s
  </text>

  <!-- env tags -->
  <rect x="430" y="273" width="44" height="18" rx="4" fill="#1e2538" stroke="#3b82f6" stroke-width="0.7"/>
  <text x="452" y="286" font-family="'Courier New',monospace" font-size="9" fill="#93c5fd" text-anchor="middle">local</text>

  <rect x="482" y="273" width="32" height="18" rx="4" fill="#251e10" stroke="#f59e0b" stroke-width="0.7"/>
  <text x="498" y="286" font-family="'Courier New',monospace" font-size="9" fill="#fcd34d" text-anchor="middle">CI</text>

  <rect x="522" y="273" width="62" height="18" rx="4" fill="#182318" stroke="#22c55e" stroke-width="0.7"/>
  <text x="553" y="286" font-family="'Courier New',monospace" font-size="9" fill="#86efac" text-anchor="middle">node:22</text>

  <text x="768" y="288" font-family="'Courier New',monospace" font-size="9" fill="#374151" text-anchor="end">github.com/jhrahman</text>
</svg>
