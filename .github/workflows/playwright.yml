name: Playwright Docker Tests

on:
  push:
    branches: [main]

  pull_request:
    branches: [main]

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  playwright-tests:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # Checkout source
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Configure GitHub Pages
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      # Build the Docker image
      - name: Build Docker Image
        run: |
          docker build -f Dockerfile.ci -t playwright-test-image .

      # Create a container but don't remove it afterwards.
      # We need it so we can copy reports from it.
      - name: Create Test Container
        run: |
          docker create --name playwright-test-container playwright-test-image

      # Run Playwright tests.
      # continue-on-error lets the workflow continue even if tests fail.
      - name: Run Playwright Tests
        id: tests
        continue-on-error: true
        run: |
          docker start -a playwright-test-container

      # Copy generated reports from the stopped container.
      - name: Copy Test Artifacts
        if: always()
        run: |
          docker cp playwright-test-container:/app/allure-results ./allure-results
          docker cp playwright-test-container:/app/playwright-report ./playwright-report
          docker cp playwright-test-container:/app/test-results ./test-results

      # Remove the container now that we've copied everything.
      - name: Remove Test Container
        if: always()
        run: |
          docker rm playwright-test-container

      # Generate Allure HTML using a fresh temporary container.
      # The current workspace is mounted so the report is written
      # back to the GitHub runner.
      - name: Generate Allure Report
        if: always()
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/allure-results:/app/allure-results \
            -v ${{ github.workspace }}/allure-report:/app/allure-report \
            playwright-test-image \
            allure generate allure-results --clean -o allure-report

      # Upload Playwright HTML report
      - name: Upload Playwright HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: playwright-report

      # Upload Allure HTML report
      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report

      # Upload traces, screenshots and videos
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results

      # Publish the latest Allure report to GitHub Pages
      - name: Upload GitHub Pages Artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

      - name: Deploy to GitHub Pages
        if: always()
        id: deployment
        uses: actions/deploy-pages@v4

      # Make the workflow fail if Playwright tests failed
      - name: Fail Workflow if Tests Failed
        if: steps.tests.outcome == 'failure'
        run: exit 1