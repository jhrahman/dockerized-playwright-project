name: Playwright Docker Tests

on:
  push:
    branches: [main]

  pull_request:
    branches: [main]

  workflow_dispatch:

  schedule:
    # Every Monday at 3:00 PM Bangladesh (09:00 UTC)
    - cron: '0 9 * * 1'

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  playwright-tests:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # Checkout source
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Configure GitHub Pages
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      # Build CI Docker image
      - name: Build Docker Image
        run: |
          docker build -f Dockerfile.ci -t playwright-test-image .

      # Create test container
      - name: Create Test Container
        run: |
          docker create --name playwright-test-container playwright-test-image

      # Run Playwright tests
      # continue-on-error allows the workflow to continue so
      # reports and notifications are still generated.
      - name: Run Playwright Tests
        id: tests
        continue-on-error: true
        run: |
          docker start -a playwright-test-container

      # Copy reports from the stopped container
      - name: Copy Test Artifacts
        if: always()
        run: |
          docker cp playwright-test-container:/app/allure-results ./allure-results
          docker cp playwright-test-container:/app/playwright-report ./playwright-report
          docker cp playwright-test-container:/app/test-results ./test-results

      # Clean up container
      - name: Remove Test Container
        if: always()
        run: |
          docker rm playwright-test-container

      # Generate Allure HTML report
      - name: Generate Allure Report
        if: always()
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/allure-results:/app/allure-results \
            -v ${{ github.workspace }}/allure-report:/app/allure-report \
            playwright-test-image \
            allure generate allure-results --clean -o allure-report

      # Upload Playwright HTML Report
      - name: Upload Playwright HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: playwright-report

      # Upload Allure Report
      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report

      # Upload traces, screenshots and videos
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results

      # Publish latest Allure report to GitHub Pages
      - name: Upload GitHub Pages Artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

      # Deploy GitHub Pages
      - name: Deploy to GitHub Pages
        if: always()
        id: deployment
        uses: actions/deploy-pages@v4

      # Send Discord notification
      # Runs after GitHub Pages deployment so the latest report URL is included.
      - name: Send Discord Notification
        if: always()
        env:
          DISCORD_WEBHOOK: ${{ secrets.TEST_APP }}
          REPORT_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          node scripts/discord-summary.js

      # Mark workflow as failed if Playwright tests failed.
      # Keep this LAST so reports and notifications are still available.
      - name: Fail Workflow if Tests Failed
        if: steps.tests.outcome == 'failure'
        run: exit 1